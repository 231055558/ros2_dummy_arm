controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint1_position_controller:
      type: position_controllers/JointPositionController
    joint2_position_controller:
      type: position_controllers/JointPositionController
    joint3_position_controller:
      type: position_controllers/JointPositionController
    joint4_position_controller:
      type: position_controllers/JointPositionController
    joint5_position_controller:
      type: position_controllers/JointPositionController
    joint6_position_controller:
      type: position_controllers/JointPositionController

joint1_position_controller:
  ros__parameters:
    joint: joint1
    command_interfaces:
      - position
    state_interfaces:
      - position

joint2_position_controller:
  ros__parameters:
    joint: joint2
    command_interfaces:
      - position
    state_interfaces:
      - position

joint3_position_controller:
  ros__parameters:
    joint: joint3
    command_interfaces:
      - position
    state_interfaces:
      - position

joint4_position_controller:
  ros__parameters:
    joint: joint4
    command_interfaces:
      - position
    state_interfaces:
      - position

joint5_position_controller:
  ros__parameters:
    joint: joint5
    command_interfaces:
      - position
    state_interfaces:
      - position

joint6_position_controller:
  ros__parameters:
    joint: joint6
    command_interfaces:
      - position
    state_interfaces:
      - position 